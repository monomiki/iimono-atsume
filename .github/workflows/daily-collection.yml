name: Daily Collection

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Sync feedback
        run: python -m src.cli feedback-sync
        env:
          RAINDROP_ACCESS_TOKEN: ${{ secrets.RAINDROP_ACCESS_TOKEN }}
      - name: Daily run
        run: python -m src.cli daily-run
        env:
          RAINDROP_ACCESS_TOKEN: ${{ secrets.RAINDROP_ACCESS_TOKEN }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          DATABASE_URL: sqlite:///data/recommendations.db
          TIMEZONE: Asia/Tokyo
          DRY_RUN: "false"
          PUBLIC_SITE_DOMAIN: ${{ vars.PUBLIC_SITE_DOMAIN }}
          PUBLIC_SITE_BASE_URL: ${{ vars.PUBLIC_SITE_BASE_URL }}
          PUBLIC_SITE_PATH_PREFIX: /daily
          FAVORITE_API_BASE_URL: ${{ vars.FAVORITE_API_BASE_URL }}
          FAVORITE_ALLOWED_ORIGIN: ${{ vars.FAVORITE_ALLOWED_ORIGIN }}
          DISCORD_DAILY_WEBHOOK_URL: ${{ secrets.DISCORD_DAILY_WEBHOOK_URL }}
          DISCORD_CLIPBOARD_WEBHOOK_URL: ${{ secrets.DISCORD_CLIPBOARD_WEBHOOK_URL }}
      - name: Test
        run: python -m unittest discover -s tests
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify deployed page
        run: curl -fsSL "${{ steps.deployment.outputs.page_url }}"
      - name: Notify Discord after deployment
        run: python -m src.cli notify-discord --date "$(TZ=Asia/Tokyo date +%F)"
        env:
          DATABASE_URL: sqlite:///data/recommendations.db
          PUBLIC_SITE_BASE_URL: ${{ vars.PUBLIC_SITE_BASE_URL }}
          DISCORD_DAILY_WEBHOOK_URL: ${{ secrets.DISCORD_DAILY_WEBHOOK_URL }}

